# pytest.ini
[pytest]
addopts = -s -v
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    ui: Маркировка для UI тестов
    slow: Маркировка для медленных тестов
    smoke: Маркировка для смоук тестов
    custom: Маркировка для кастомных тестов
    critical: Маркировка для критичных тестов
    dashboard: Маркировка для тестов, связанных с рабочей панелью
    regression: Маркировка для регрессионных тестов
    registration: Маркировка для тестов, связанных с регистрацией
    authorization: Маркировка для тестов, связанных с авторизацией
    courses: Маркировка тестов для страницы Courses
